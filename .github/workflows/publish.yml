name: publish

# Build the multi-arch middleman image and push it to GHCR so the deployed fork
# image stays in sync with the source. Runs on pushes to the docker-image branch
# and main (and vX.Y.Z tags), plus manual dispatch.
#
# Auth: uses the CR_PAT secret (a PAT with write:packages), NOT the built-in
# GITHUB_TOKEN. The package was first created by a manual docker push, so it is
# not linked to the repo and the built-in token cannot push to it. Add CR_PAT
# under Settings -> Secrets and variables -> Actions before this can publish.
on:
  push:
    branches: [main, feat/production-docker-image]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prep (lowercase image name + build metadata)
        run: |
          echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
          echo "DATE_TAG=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CR_PAT }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/feat/production-docker-image' || github.ref == 'refs/heads/main' }}
            type=raw,value=${{ env.DATE_TAG }},enable=${{ github.ref_type == 'branch' }}
            type=sha,format=short
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ env.BUILD_DATE }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
