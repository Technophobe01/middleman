[project]
site_name = "middleman"
site_description = "Local-first maintainer console"
site_author = "Kenn Software LLC"
copyright = 'Copyright &copy; 2026 <a href="https://kenn.io">Kenn Software LLC</a>. Elastic License 2.0.'
docs_dir = "docs"
site_dir = "site"
repo_url = "https://github.com/kenn-io/middleman"
repo_name = "kenn-io/middleman"
extra_css = ["stylesheets/extra.css"]
use_directory_urls = true
nav = [
  {"Quick Start" = "quickstart.md"},
  {"Workflows" = [
    {"Overview" = "workflows.md"},
    {"I am an issue triager" = "workflows/issue-triager.md"},
    {"I am a code reviewer" = "workflows/code-reviewer.md"},
  ]},
  {"Configuration" = "configuration.md"},
  {"Commands" = "commands.md"},
  {"Fleet" = "federated-fleet.md"},
  {"Troubleshooting" = "troubleshooting.md"},
]

[project.extra]
homepage = "/"

[project.theme]
variant = "modern"
features = [
  "navigation.instant",
  "navigation.instant.progress",
  "navigation.tracking",
  "navigation.sections",
  "navigation.path",
  "content.code.copy",
]

[[project.theme.palette]]
scheme = "default"
primary = "custom"
accent = "custom"
toggle = { icon = "material/weather-night", name = "Switch to dark mode" }

[[project.theme.palette]]
scheme = "slate"
primary = "custom"
accent = "custom"
toggle = { icon = "material/weather-sunny", name = "Switch to light mode" }

[project.theme.icon]
repo = "fontawesome/brands/github"
edit = "lucide/pencil"
view = "lucide/file-code"

[project.markdown_extensions.admonition]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.tables]

[project.markdown_extensions.toc]
permalink = true
